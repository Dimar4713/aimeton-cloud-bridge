name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include OAuth tokens, proxy passwords, or private file links.
  - type: input
    id: version
    attributes:
      label: Plugin version
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Windows, macOS, Linux, Android, iOS]
    validations:
      required: true
  - type: dropdown
    id: network
    attributes:
      label: Network mode
      options: [System connection, HTTP CONNECT, HTTPS CONNECT, SOCKS5, Mobile VPN/TUN]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
